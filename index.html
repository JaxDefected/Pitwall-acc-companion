    <meta property="og:title" content="PitWall ACC Setup Lab - Late Night Racing Beta" />

    <meta property="og:type" content="website" />
    <!-- Prevent window.fetch read-only property assignment crashes in certain iframe or polyfilled environments -->
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return originalFetch;
            },
            set: function(val) {
              originalFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Failed to define configurable window.fetch:', e);
        }
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
